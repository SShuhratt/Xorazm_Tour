services:
  app:
    build:
      context: docker
      dockerfile: Dockerfile.prod
    container_name: xorazmtour-app
    volumes:
      - .:/var/www/
    depends_on:
      - db
    networks:
      - xorazm-tour
  db:
    image: postgres:15
    container_name: xorazmtour-db
    environment:
      POSTGRES_DB: xorazm_tour_db
      POSTGRES_USER: xt_user
      POSTGRES_PASSWORD: xt1981
    ports:
      - "5436:5432"
    volumes:
      - xorazm-tour:/var/lib/postgresql/data
    networks:
      - xorazm-tour

  nginx:
    image: nginx:alpine
    container_name: xorazmtour-nginx
    ports:
      - "85:80"
    volumes:
      - .:/var/www/
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - xorazm-tour

volumes:
  xorazm-tour:

networks:
  xorazm-tour:
